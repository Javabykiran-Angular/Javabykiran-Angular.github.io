export default "<div class=\"container-fluid\">\n  <app-header></app-header>\n\n  <div class=\"row\">\n    <div class=\"col-12 col-sm-12 col-md-12 col-lg-12\">\n\n      <div style=\"text-align: center;\">                    \n        <div class=\"card\" style=\"width:400px\">\n           \n            <div class=\"card-body\">\n              <h4 class=\"card-title\">{{empobj.name}} </h4>\n              <div class=\"card-text\">\n                <h5 style=\"text-align: center;\">\n                <label for=\"\">Status:</label> &nbsp;  \n                 <span [ngClass]=\"{\n                    'badge':true,\n                    'badge-pill':true,\n                    'badge-success':empobj.status.toLowerCase()== 'active',\n                    'badge-warning':empobj.status.toLowerCase()=='inactive',\n                    'badge-danger':empobj.status.toLowerCase()=='suspend'\n                }\" style=\"padding: 10px;\" >{{empobj.status}}</span>\n            \n            </h5> \n                  <span> {{empobj.phoneno}} </span><br>\n                  <span> <strong> {{empobj.createdby}} </strong> </span>\n              </div>\n              <button class=\"btn btn-primary stretched-link\" (click)=\"OnUpdate()\">Upadate Employee</button>\n              <button routerLink=\"/home\" class=\"btn btn-warning\">Home</button>\n            </div>\n          </div>\n    </div>\n\n    </div>\n  </div>\n</div>\n"
