export default "<div class=\"container-fluid\">\n    <app-header></app-header>\n<h2>Add Employee</h2>\n\n<br>\n\n<div class=\"row\">\n    <div class=\"col-8 col-sm-8 col-md-8 col-lg-8\" style=\"margin-left: 30px;\">\n\n        <form #f=ngForm (ngSubmit)=\"onSubmit(f)\">\n            <!-- {{f.value|json}} -->\n            <div class=\"form-group\">\n                <label for=\"\">Employee Name</label>\n                <input type=\"text\" placeholder=\"Enter the Employee Name\"\n                    #empname=\"ngModel\" ngModel name=\"name\"\n                    class=\"form-control\"\n                     required\n                >\n                <div class=\"alert alert-danger\" \n                *ngIf=\"empname.touched && !empname.valid\"> ** Please Enter the Employee Name\n\n                </div>\n            </div>\n\n            <div class=\"form-group\">\n                <label for=\"\">Employee Department</label>\n                <input type=\"text\" placeholder=\"Enter the Employee Department\"\n                    #empdept=\"ngModel\" ngModel name=\"departmentit\"\n                    class=\"form-control\"\n                     required\n                >\n               \n            </div>\n            <div class=\"form-group\">\n                <label for=\"\">Employee Status</label>\n                <input type=\"text\" placeholder=\"Enter the Employee Status\"\n                    #empstatus=\"ngModel\" ngModel name=\"status\"\n                    class=\"form-control\"\n                     required\n                >\n               \n            </div>\n            <div class=\"form-group\">\n                <label for=\"\">Employee Mobile Number</label>\n                <input type=\"number\" minlength=\"10\" maxlength=\"13\" placeholder=\"Enter the Employee Mobile No\"\n                    #empphone=\"ngModel\" ngModel name=\"phoneno\"\n                    class=\"form-control\"\n                     required\n                >\n               \n            </div>\n\n            \n            <div class=\"form-group\">\n                <label for=\"\">Country</label>\n                <select ngModel name=\"country\" id=\"\" class=\"form-control\" >\n                    <option *ngFor=\"let item of allCountry\" [ngValue]=\"item\" >\n                        {{item.cname}}\n                    </option>\n                </select>\n        \n           </div>\n           <button class=\"btn btn-success\" [disabled]=!f.valid>Submit</button>\n\n        </form>\n\n\n    </div>\n\n</div>\n\n</div>\n"
